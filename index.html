<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Utility — Financial Calculators</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== YOUR ORIGINAL DESIGN (UNCHANGED) ===== */
:root {
  --gold: #C9A84C; --gold-light: #E8C96A; --gold-dim: rgba(201,168,76,0.15);
  --dark: #0A0A0F; --dark2: #111118; --dark3: #1A1A24; --dark4: #22222F;
  --text: #F0EDE8; --text-dim: #9A9490; --green: #2ECC8A; --red: #E05A5A;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,168,76,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(90,142,224,0.05) 0%, transparent 50%);
}

/* HEADER */
header { text-align: center; padding: 40px 24px 24px; }

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(40px, 7vw, 72px);
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, var(--gold-light) 45%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* COUNTRY */
.country-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
.country-select-box {
  display: flex; align-items: center; gap: 12px;
  background: var(--dark2);
  border: 1.5px solid rgba(201,168,76,0.35);
  border-radius: 14px;
  padding: 10px 18px;
}

/* TABS */
.tabs-wrap { max-width: 920px; margin: auto; padding: 0 20px; }

.tabs {
  display: flex;
  gap: 4px;
  background: var(--dark2);
  border: 1px solid var(--dark4);
  border-radius: 14px;
  padding: 6px;
  overflow-x: auto;
}

.tab {
  flex: 1;
  min-width: 90px;
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 9px 12px;
  border-radius: 10px;
  cursor: pointer;
}

.tab.active {
  background: var(--gold);
  color: var(--dark);
  font-weight: 700;
}

/* MAIN */
.main { max-width: 920px; margin: 16px auto; padding: 0 20px 80px; }

/* CARD */
.calc-card {
  background: var(--dark2);
  border: 1px solid var(--dark4);
  border-radius: 20px;
  padding: 28px;
  display: none;
}

.calc-card.active { display: block; }

/* FORM */
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}

.field label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.input-wrap {
  background: var(--dark3);
  border: 1.5px solid var(--dark4);
  border-radius: 10px;
  display: flex;
}

.input-wrap input, .input-wrap select {
  width: 100%;
  background: none;
  border: none;
  color: var(--text);
  padding: 10px;
}

/* BUTTON */
.calc-btn {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(90deg,#C9A84C,#E8C96A);
  font-weight: 700;
}

/* RESULTS */
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
  margin-top: 20px;
}

.result-box {
  background: var(--dark3);
  border: 1px solid var(--dark4);
  padding: 14px;
  border-radius: 12px;
  text-align: center;
}

.result-label {
  font-size: 10px;
  color: var(--text-dim);
}

.result-value {
  font-size: 18px;
  margin-top: 6px;
}
</style>
</head>

<body>

<header>
  <h1>1Utility</h1>

  <div class="country-wrap">
    <div class="country-select-box">
      <label style="font-size:11px;color:var(--gold);">Region</label>
      <select id="country" onchange="setRegion()">
        <option value="IN">India (₹)</option>
        <option value="US">USA ($)</option>
        <option value="UK">UK (£)</option>
      </select>
    </div>
  </div>
</header>

<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="openTab('emi',this)">EMI</button>
    <button class="tab" onclick="openTab('sip',this)">SIP</button>
    <button class="tab" onclick="openTab('tax',this)">Tax</button>
    <button class="tab" onclick="openTab('fd',this)">FD</button>
  </div>
</div>

<div class="main">

<!-- EMI -->
<div id="emi" class="calc-card active">
  <div class="form-grid">
    <div class="field">
      <label>Loan Amount</label>
      <div class="input-wrap"><input id="emiP" type="number" value="1000000"></div>
    </div>
    <div class="field">
      <label>Interest %</label>
      <div class="input-wrap"><input id="emiR" type="number" value="8.5"></div>
    </div>
    <div class="field">
      <label>Years</label>
      <div class="input-wrap"><input id="emiN" type="number" value="20"></div>
    </div>
  </div>

  <button class="calc-btn" onclick="calcEMI()">Calculate</button>
  <div class="result-grid" id="emiOut"></div>
</div>

<!-- SIP -->
<div id="sip" class="calc-card">
  <div class="form-grid">
    <div class="field"><label>Monthly</label><div class="input-wrap"><input id="sipA" value="10000"></div></div>
    <div class="field"><label>Return %</label><div class="input-wrap"><input id="sipR" value="12"></div></div>
    <div class="field"><label>Years</label><div class="input-wrap"><input id="sipY" value="15"></div></div>
  </div>

  <button class="calc-btn" onclick="calcSIP()">Calculate</button>
  <div class="result-grid" id="sipOut"></div>
</div>

<!-- TAX -->
<div id="tax" class="calc-card">
  <div class="form-grid">
    <div class="field"><label>Income</label><div class="input-wrap"><input id="taxI" value="1200000"></div></div>
  </div>

  <button class="calc-btn" onclick="calcTax()">Calculate</button>
  <div class="result-grid" id="taxOut"></div>
</div>

<!-- FD -->
<div id="fd" class="calc-card">
  <div class="form-grid">
    <div class="field"><label>Amount</label><div class="input-wrap"><input id="fdP" value="500000"></div></div>
    <div class="field"><label>Rate</label><div class="input-wrap"><input id="fdR" value="7"></div></div>
    <div class="field"><label>Years</label><div class="input-wrap"><input id="fdY" value="3"></div></div>
  </div>

  <button class="calc-btn" onclick="calcFD()">Calculate</button>
  <div class="result-grid" id="fdOut"></div>
</div>

</div>

<script>

function openTab(id,btn){
  document.querySelectorAll('.calc-card').forEach(c=>c.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

/* EMI */
function calcEMI(){
  let P=+emiP.value, r=+emiR.value/12/100, n=+emiN.value*12;
  let e=P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);

  emiOut.innerHTML=`
  <div class="result-box"><div class="result-label">EMI</div><div class="result-value">${Math.round(e)}</div></div>
  <div class="result-box"><div class="result-label">Total</div><div class="result-value">${Math.round(e*n)}</div></div>`;
}

/* SIP */
function calcSIP(){
  let m=+sipA.value, r=+sipR.value/100/12, n=+sipY.value*12;
  let v=m*((Math.pow(1+r,n)-1)/r)*(1+r);

  sipOut.innerHTML=`
  <div class="result-box"><div class="result-label">Maturity</div><div class="result-value">${Math.round(v)}</div></div>`;
}

/* TAX */
function calcTax(){
  let i=+taxI.value;
  taxOut.innerHTML=`
  <div class="result-box"><div class="result-label">Tax</div><div class="result-value">${Math.round(i*0.1)}</div></div>`;
}

/* FD */
function calcFD(){
  let p=+fdP.value, r=+fdR.value/100, y=+fdY.value;
  let m=p*Math.pow(1+r,y);

  fdOut.innerHTML=`
  <div class="result-box"><div class="result-label">Maturity</div><div class="result-value">${Math.round(m)}</div></div>`;
}

</script>

</body>
</html>
